<section class="relative bg-slate-900 py-16 px-6 overflow-hidden sm:px-12 lg:px-24 rounded-3xl my-8">
  <div class="relative z-10 lg:flex lg:items-center lg:gap-12">
    <div class="lg:w-1/3 mb-8 lg:mb-0">
      <img src="{{ .Params.image }}" alt="{{ .Title }}" 
           class="w-64 h-64 object-cover rounded-2xl shadow-2xl border-4 border-indigo-500/30 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
    </div>

    <div class="lg:w-2/3">
      <span class="text-indigo-400 font-bold tracking-widest uppercase text-sm">On This Day: {{ .Date.Format "January 02" }}</span>
      <h1 class="text-4xl sm:text-6xl font-extrabold text-white mt-4 mb-6 tracking-tight">
        {{ .Title }}
      </h1>
      <p class="text-slate-300 text-lg sm:text-xl leading-relaxed mb-8 italic">
        "{{ .Params.quote }}"
      </p>
      <div class="flex gap-4">
        <a href="{{ .Permalink }}" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-8 rounded-full transition-all shadow-lg shadow-indigo-500/20">
          Read the Full Story
        </a>
        <a href="/archive" class="text-slate-400 hover:text-white font-semibold py-3 px-4 transition-colors">
          Browse Archive →
        </a>
      </div>
    </div>
  </div>
  
  <div class="absolute top-0 right-0 -translate-y-12 translate-x-12 blur-3xl opacity-20 pointer-events-none">
    <div class="w-96 h-96 bg-indigo-500 rounded-full"></div>
  </div>
</section>
